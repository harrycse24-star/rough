<!DOCTYPE html>
<html>
<head>
    <title>Stock Predictor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f7fa;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 30px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }

        canvas {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Upload CSV</h2>

    <input type="file" id="fileInput"><br><br>
    <button onclick="upload()">Predict</button>

    <p id="status"></p>
</div>

<canvas id="chart"></canvas>

<script>
function upload() {

    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a CSV file");
        return;
    }

    document.getElementById("status").innerText = "Processing...";

    const formData = new FormData();
    formData.append("file", file);

    fetch("http://localhost:8080/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        let dates = data.dates;
        let prices = data.prices;
        let predicted = data.predictedPrice;

        dates.push("Next Day");
        prices.push(predicted);

        document.getElementById("status").innerText =
            "Status: " + data.status;

        const ctx = document.getElementById("chart");

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [
                    {
                        label: "Historical",
                        data: prices.slice(0, -1),
                        borderWidth: 2,
                        tension: 0.3
                    },
                    {
                        label: "Prediction",
                        data: [...Array(prices.length - 1).fill(null), predicted],
                        borderWidth: 2,
                        borderDash: [5,5]
                    }
                ]
            }
        });

    })
    .catch(err => {
        console.error(err);
        document.getElementById("status").innerText =
            "Error: Backend not reachable";
    });
}
</script>

</body>
</html>
