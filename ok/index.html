<!DOCTYPE html>
<html>
<head>
    <title>Stock Trend</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Stock Price Trend</h2>
<p id="status"></p>

<canvas id="chart"></canvas>

<script>
fetch("http://localhost:8080/predict")
.then(res => res.json())
.then(data => {

    let dates = data.dates;
    let prices = data.prices;
    let predicted = data.predictedPrice;

    // Add prediction point
    dates.push("Next Day");
    prices.push(predicted);

    document.getElementById("status").innerText =
        "Status: " + data.status;

    const ctx = document.getElementById("chart");

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: dates,
            datasets: [
                {
                    label: "Historical Price",
                    data: prices.slice(0, -1),
                    borderWidth: 2,
                    tension: 0.3
                },
                {
                    label: "Prediction",
                    data: [...Array(prices.length - 1).fill(null), predicted],
                    borderWidth: 2,
                    borderDash: [5, 5]
                }
            ]
        }
    });

});
</script>

</body>
</html>
